# Configuração do Mosquitto para o laboratório.
#
# ATENÇÃO: `allow_anonymous true` é aceitável APENAS aqui, num broker efêmero ligado a
# loopback. Num broker de produção isto significa que qualquer um na rede pode publicar
# em qualquer tópico, inclusive apagar mensagens retidas e forjar telemetria de
# dispositivos. Brokers MQTT expostos à internet sem autenticação são uma das fontes mais
# conhecidas de vazamento de dados industriais — há scanners públicos indexando-os.
#
# Em produção: TLS na 8883, autenticação por certificado de cliente ou usuário/senha,
# e uma ACL que restrinja cada dispositivo ao seu próprio ramo de tópicos.

listener 1883
protocol mqtt
allow_anonymous true

# MQTT sobre WebSocket. Um navegador não fala MQTT sobre TCP, mas fala nesta porta.
# É a alternativa ao gateway: em vez de o backend traduzir MQTT para WebSocket, o
# próprio broker expõe MQTT dentro de um WebSocket, e o navegador vira um cliente MQTT
# de primeira classe (com mqtt.js, por exemplo).
listener 9001
protocol websockets
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

# Mensagens retidas e sessões persistentes sobrevivem a um restart do broker.
autosave_interval 60

log_dest stdout
log_type warning
log_type error
log_type notice
connection_messages true
